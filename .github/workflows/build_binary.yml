name: Build Binary

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Build binary with PyInstaller
        run: >
          pyinstaller --onefile --name investment-mcp
          src/investment_mcp/server.py
          --add-data "src/investment_mcp/knowledge:knowledge"
          --add-data "src/investment_mcp/reports/templates:templates"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: investment-mcp-${{ matrix.os }}
          path: |
            dist/investment-mcp
            dist/investment-mcp.exe

      - name: Attach binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/investment-mcp
            dist/investment-mcp.exe
