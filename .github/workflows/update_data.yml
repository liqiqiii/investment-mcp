name: Update Financial Data

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install project
        run: pip install -e .

      - name: Fetch data and generate reports
        env:
          INVESTMENT_FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update financial data and reports"
          git push
